<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users – Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #050510;
            color: #e2e8f0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar {
            background: rgba(10, 5, 30, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        .nav-item {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(249, 115, 22, 0.12);
            color: #fb923c;
            border-left-color: #f97316;
        }

        .btn-admin {
            background: linear-gradient(135deg, #f97316, #ef4444);
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-inactive {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-admin {
            background: rgba(249, 115, 22, 0.15);
            color: #fb923c;
            border: 1px solid rgba(249, 115, 22, 0.2);
        }

        table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>

<body class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="sidebar w-64 min-h-screen fixed left-0 top-0 z-40 flex flex-col">
        <div class="p-6 border-b border-white/6">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 btn-admin rounded-xl flex items-center justify-center"><svg
                        class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M18 8a6 6 0 01-7.743 5.743L10 14l-1 1-1 1H6v2H2v-4l4.257-4.257A6 6 0 1118 8zm-6-4a1 1 0 100 2 2 2 0 012 2 1 1 0 102 0 4 4 0 00-4-4z" />
                    </svg></div>
                <div>
                    <div class="text-white font-bold text-sm">Digital Store</div>
                    <div class="text-orange-400 text-xs">Admin Panel</div>
                </div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="dashboard.html"
                class="nav-item flex items-center space-x-3 px-4 py-3 rounded-xl text-sm text-slate-400"><span>📊</span><span>Dashboard</span></a>
            <a href="products.html"
                class="nav-item flex items-center space-x-3 px-4 py-3 rounded-xl text-sm text-slate-400"><span>📦</span><span>Products</span></a>
            <a href="orders.html"
                class="nav-item flex items-center space-x-3 px-4 py-3 rounded-xl text-sm text-slate-400"><span>🛒</span><span>Orders</span></a>
            <a href="users.html"
                class="nav-item active flex items-center space-x-3 px-4 py-3 rounded-xl text-sm"><span>👥</span><span>Users</span></a>
        </nav>
        <div class="p-4 border-t border-white/6">
            <button onclick="adminLogout()"
                class="w-full flex items-center space-x-2 px-3 py-2 glass rounded-lg text-red-400 text-sm hover:bg-red-500/10"><span>🚪</span><span>Logout</span></button>
        </div>
    </aside>

    <main class="ml-64 flex-1 p-8">
        <div class="mb-8">
            <h1 class="text-3xl font-black text-white">Users</h1>
            <p class="text-slate-400 mt-1">Manage registered user accounts.</p>
        </div>

        <!-- Alert -->
        <div id="alert" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

        <!-- Search -->
        <div class="max-w-sm mb-6">
            <input id="search-input" type="text" placeholder="Search users..."
                class="w-full bg-white/4 border border-white/8 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-500/40"
                oninput="filterUsers(this.value)" />
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="glass rounded-xl p-4 text-center">
                <div id="s-total" class="text-2xl font-black text-white">—</div>
                <div class="text-slate-400 text-xs">Total Users</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div id="s-active" class="text-2xl font-black text-green-400">—</div>
                <div class="text-slate-400 text-xs">Active</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div id="s-inactive" class="text-2xl font-black text-red-400">—</div>
                <div class="text-slate-400 text-xs">Inactive</div>
            </div>
        </div>

        <!-- Table -->
        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="border-b border-white/8">
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            User</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Email</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Orders</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Role</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Status</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Joined</th>
                        <th class="text-right px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr>
                        <td colspan="7" class="text-center py-10 text-slate-400">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin + '/api';
        const adminToken = localStorage.getItem('admin_token');
        if (!adminToken) window.location.href = 'admin_login.html';

        function getHeaders() { return { 'Authorization': `Bearer ${adminToken}` }; }
        function adminLogout() { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); window.location.href = 'admin_login.html'; }

        let allUsers = [];

        function showAlert(msg, type = 'success') {
            const el = document.getElementById('alert');
            el.className = type === 'success'
                ? 'mb-4 p-3 rounded-xl text-sm bg-green-500/10 border border-green-500/30 text-green-400'
                : 'mb-4 p-3 rounded-xl text-sm bg-red-500/10 border border-red-500/30 text-red-400';
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/orders/admin/users`, { headers: getHeaders() });
                if (res.status === 401 || res.status === 403) { adminLogout(); return; }
                allUsers = await res.json();

                const regular = allUsers.filter(u => !u.is_admin);
                document.getElementById('s-total').textContent = regular.length;
                document.getElementById('s-active').textContent = regular.filter(u => u.is_active).length;
                document.getElementById('s-inactive').textContent = regular.filter(u => !u.is_active).length;

                renderTable(allUsers);
            } catch {
                document.getElementById('users-table').innerHTML = '<tr><td colspan="7" class="text-center py-10 text-red-400">Failed to load users</td></tr>';
            }
        }

        function filterUsers(query) {
            const filtered = allUsers.filter(u =>
                u.username.toLowerCase().includes(query.toLowerCase()) ||
                u.email.toLowerCase().includes(query.toLowerCase())
            );
            renderTable(filtered);
        }

        function renderTable(users) {
            const tbody = document.getElementById('users-table');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-10 text-slate-400">No users found.</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
        <tr class="border-b border-white/5">
          <td class="px-5 py-4">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 rounded-full btn-admin flex items-center justify-center text-white text-sm font-bold">
                ${u.username[0].toUpperCase()}
              </div>
              <div class="font-medium text-white text-sm">${u.username}</div>
            </div>
          </td>
          <td class="px-5 py-4 text-slate-400 text-sm">${u.email}</td>
          <td class="px-5 py-4 text-slate-300 text-sm font-medium">${u.order_count}</td>
          <td class="px-5 py-4">
            <span class="px-2 py-1 rounded-full text-xs font-medium ${u.is_admin ? 'badge-admin' : 'text-slate-400'}">
              ${u.is_admin ? '⭐ Admin' : 'User'}
            </span>
          </td>
          <td class="px-5 py-4">
            <span class="px-2 py-1 rounded-full text-xs font-medium ${u.is_active ? 'badge-active' : 'badge-inactive'}">
              ${u.is_active ? '● Active' : '○ Inactive'}
            </span>
          </td>
          <td class="px-5 py-4 text-slate-400 text-xs">${new Date(u.created_at).toLocaleDateString()}</td>
          <td class="px-5 py-4 text-right">
            ${!u.is_admin ? `
              <button onclick="toggleUser(${u.id}, ${u.is_active})"
                class="px-3 py-1.5 rounded-lg text-xs transition-colors ${u.is_active ? 'bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20' : 'bg-green-500/10 border border-green-500/20 text-green-400 hover:bg-green-500/20'}">
                ${u.is_active ? 'Deactivate' : 'Activate'}
              </button>
            ` : '<span class="text-slate-600 text-xs">Protected</span>'}
          </td>
        </tr>
      `).join('');
        }

        async function toggleUser(id, currentStatus) {
            try {
                const res = await fetch(`${API_BASE}/orders/admin/user/${id}/toggle`, {
                    method: 'PUT',
                    headers: getHeaders(),
                });
                if (!res.ok) throw new Error('Failed to update user');
                const data = await res.json();
                showAlert(`✅ ${data.message}`);
                loadUsers();
            } catch (err) {
                showAlert('❌ ' + err.message, 'error');
            }
        }

        loadUsers();
    </script>
</body>

</html>
