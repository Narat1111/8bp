<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products – Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #050510;
            color: #e2e8f0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar {
            background: rgba(10, 5, 30, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        .nav-item {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(249, 115, 22, 0.12);
            color: #fb923c;
            border-left-color: #f97316;
        }

        .btn-admin {
            background: linear-gradient(135deg, #f97316, #ef4444);
            transition: all 0.3s;
        }

        .btn-admin:hover:not(:disabled) {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        .input-field:focus {
            border-color: rgba(249, 115, 22, 0.5);
            outline: none;
        }

        .input-field::placeholder {
            color: #475569;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
        }

        .modal-card {
            background: #0a0520;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .badge-inactive {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>

<body class="flex min-h-screen">

    <!-- Sidebar (reused) -->
    <aside class="sidebar w-64 min-h-screen fixed left-0 top-0 z-40 flex flex-col">
        <div class="p-6 border-b border-white/6">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 btn-admin rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M18 8a6 6 0 01-7.743 5.743L10 14l-1 1-1 1H6v2H2v-4l4.257-4.257A6 6 0 1118 8zm-6-4a1 1 0 100 2 2 2 0 012 2 1 1 0 102 0 4 4 0 00-4-4z" />
                    </svg>
                </div>
                <div>
                    <div class="text-white font-bold text-sm">Digital Store</div>
                    <div class="text-orange-400 text-xs">Admin Panel</div>
                </div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="dashboard.html"
                class="nav-item flex items-center space-x-3 px-4 py-3 rounded-xl text-sm text-slate-400"><span>📊</span><span>Dashboard</span></a>
            <a href="products.html"
                class="nav-item active flex items-center space-x-3 px-4 py-3 rounded-xl text-sm"><span>📦</span><span>Products</span></a>
            <a href="orders.html"
                class="nav-item flex items-center space-x-3 px-4 py-3 rounded-xl text-sm text-slate-400"><span>🛒</span><span>Orders</span></a>
            <a href="users.html"
                class="nav-item flex items-center space-x-3 px-4 py-3 rounded-xl text-sm text-slate-400"><span>👥</span><span>Users</span></a>
        </nav>
        <div class="p-4 border-t border-white/6">
            <button onclick="adminLogout()"
                class="w-full flex items-center space-x-2 px-3 py-2 glass rounded-lg text-red-400 text-sm hover:bg-red-500/10 transition-colors"><span>🚪</span><span>Logout</span></button>
        </div>
    </aside>

    <!-- Main -->
    <main class="ml-64 flex-1 p-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-black text-white">Products</h1>
                <p class="text-slate-400 mt-1">Manage your digital products catalog.</p>
            </div>
            <button onclick="openAddModal()" class="btn-admin text-white font-semibold px-5 py-2.5 rounded-xl text-sm">
                + Add Product
            </button>
        </div>

        <!-- Alert -->
        <div id="alert" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

        <!-- Table -->
        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="border-b border-white/8">
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Product</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Price</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Status</th>
                        <th class="text-left px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Account</th>
                        <th class="text-right px-5 py-4 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                            Actions</th>
                    </tr>
                </thead>
                <tbody id="products-table">
                    <tr>
                        <td colspan="5" class="text-center py-10 text-slate-400">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="modal-card rounded-2xl p-7 w-full max-w-lg max-h-screen overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 id="modal-title" class="text-xl font-black text-white">Add Product</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white">✕</button>
            </div>

            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="edit-id" />

                <div class="space-y-4">
                    <div>
                        <label class="block text-slate-400 text-xs font-semibold mb-1.5 uppercase tracking-wider">Title
                            *</label>
                        <input id="f-title" type="text" required placeholder="e.g. Netflix Premium 1 Month"
                            class="input-field w-full px-4 py-3 rounded-xl text-sm" />
                    </div>
                    <div>
                        <label
                            class="block text-slate-400 text-xs font-semibold mb-1.5 uppercase tracking-wider">Description</label>
                        <textarea id="f-description" rows="3" placeholder="Product description..."
                            class="input-field w-full px-4 py-3 rounded-xl text-sm resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label
                                class="block text-slate-400 text-xs font-semibold mb-1.5 uppercase tracking-wider">Price
                                (USD) *</label>
                            <input id="f-price" type="number" step="0.01" min="0.01" required placeholder="9.99"
                                class="input-field w-full px-4 py-3 rounded-xl text-sm" />
                        </div>
                        <div>
                            <label
                                class="block text-slate-400 text-xs font-semibold mb-1.5 uppercase tracking-wider">Status</label>
                            <select id="f-active" class="input-field w-full px-4 py-3 rounded-xl text-sm">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-slate-400 text-xs font-semibold mb-1.5 uppercase tracking-wider">Image
                            URL</label>
                        <input id="f-image" type="url" placeholder="https://..."
                            class="input-field w-full px-4 py-3 rounded-xl text-sm" />
                    </div>
                    <div class="border-t border-white/8 pt-4">
                        <p class="text-orange-400 text-xs font-semibold mb-3 uppercase tracking-wider">🔑 Account
                            Credentials (Delivered to buyer)</p>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-slate-400 text-xs mb-1">Account Email</label>
                                <input id="f-acc-email" type="email" placeholder="user@example.com"
                                    class="input-field w-full px-4 py-3 rounded-xl text-sm" />
                            </div>
                            <div>
                                <label class="block text-slate-400 text-xs mb-1">Account Password</label>
                                <input id="f-acc-pass" type="text" placeholder="SecurePass123"
                                    class="input-field w-full px-4 py-3 rounded-xl text-sm" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 mt-6">
                    <button type="submit" class="btn-admin flex-1 text-white font-bold py-3 rounded-xl text-sm">
                        <span id="save-text">Save Product</span>
                    </button>
                    <button type="button" onclick="closeModal()"
                        class="glass flex-1 text-slate-400 font-medium py-3 rounded-xl text-sm hover:text-white transition-colors">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const adminToken = localStorage.getItem('admin_token');
        if (!adminToken) window.location.href = 'admin_login.html';

        function getHeaders() {
            return { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json' };
        }

        function adminLogout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.href = 'admin_login.html';
        }

        function showAlert(msg, type = 'success') {
            const el = document.getElementById('alert');
            el.className = type === 'success'
                ? 'mb-4 p-3 rounded-xl text-sm bg-green-500/10 border border-green-500/30 text-green-400'
                : 'mb-4 p-3 rounded-xl text-sm bg-red-500/10 border border-red-500/30 text-red-400';
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/products/admin/all`, { headers: getHeaders() });
                if (res.status === 401 || res.status === 403) { adminLogout(); return; }
                const products = await res.json();
                renderTable(products);
            } catch {
                document.getElementById('products-table').innerHTML = '<tr><td colspan="5" class="text-center py-10 text-red-400">Failed to load products</td></tr>';
            }
        }

        function renderTable(products) {
            const tbody = document.getElementById('products-table');
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">No products found.</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
        <tr class="border-b border-white/5">
          <td class="px-5 py-4">
            <div class="flex items-center space-x-3">
              <img src="${p.image || 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=60&q=80'}" 
                alt="" class="w-10 h-10 rounded-lg object-cover"
                onerror="this.src='https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=60&q=80'" />
              <div>
                <div class="font-medium text-white text-sm">${p.title}</div>
                <div class="text-slate-500 text-xs line-clamp-1">${p.description || '—'}</div>
              </div>
            </div>
          </td>
          <td class="px-5 py-4 text-green-400 font-semibold text-sm">$${p.price.toFixed(2)}</td>
          <td class="px-5 py-4">
            <span class="px-2 py-1 rounded-full text-xs font-medium ${p.is_active ? 'badge-active' : 'badge-inactive'}">
              ${p.is_active ? '● Active' : '○ Inactive'}
            </span>
          </td>
          <td class="px-5 py-4 text-slate-400 text-xs font-mono">${p.account_email || '—'}</td>
          <td class="px-5 py-4 text-right">
            <div class="flex items-center justify-end space-x-2">
              <button onclick="openEditModal(${JSON.stringify(p).replace(/"/g, '&quot;')})"
                class="glass px-3 py-1.5 rounded-lg text-blue-400 hover:text-blue-300 text-xs transition-colors">Edit</button>
              <button onclick="deleteProduct(${p.id}, '${p.title}')"
                class="btn-danger px-3 py-1.5 rounded-lg text-xs transition-colors">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add New Product';
            document.getElementById('save-text').textContent = 'Save Product';
            document.getElementById('edit-id').value = '';
            document.getElementById('product-form').reset();
            document.getElementById('modal').classList.remove('hidden');
        }

        function openEditModal(product) {
            document.getElementById('modal-title').textContent = 'Edit Product';
            document.getElementById('save-text').textContent = 'Update Product';
            document.getElementById('edit-id').value = product.id;
            document.getElementById('f-title').value = product.title;
            document.getElementById('f-description').value = product.description || '';
            document.getElementById('f-price').value = product.price;
            document.getElementById('f-image').value = product.image || '';
            document.getElementById('f-acc-email').value = product.account_email || '';
            document.getElementById('f-acc-pass').value = product.account_password || '';
            document.getElementById('f-active').value = product.is_active ? 'true' : 'false';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                title: document.getElementById('f-title').value.trim(),
                description: document.getElementById('f-description').value.trim(),
                price: parseFloat(document.getElementById('f-price').value),
                image: document.getElementById('f-image').value.trim() || null,
                account_email: document.getElementById('f-acc-email').value.trim() || null,
                account_password: document.getElementById('f-acc-pass').value.trim() || null,
                is_active: document.getElementById('f-active').value === 'true',
            };

            try {
                let url, method;
                if (id) {
                    url = `${API_BASE}/products/admin/${id}`;
                    method = 'PUT';
                } else {
                    url = `${API_BASE}/products/admin/create`;
                    method = 'POST';
                }

                const res = await fetch(url, { method, headers: getHeaders(), body: JSON.stringify(data) });
                const result = await res.json();
                if (!res.ok) throw new Error(result.detail || 'Failed');

                closeModal();
                showAlert(id ? '✅ Product updated successfully!' : '✅ Product created successfully!');
                loadProducts();
            } catch (err) {
                showAlert('❌ ' + err.message, 'error');
            }
        }

        async function deleteProduct(id, title) {
            if (!confirm(`Delete "${title}"? This action cannot be undone.`)) return;
            try {
                const res = await fetch(`${API_BASE}/products/admin/${id}`, { method: 'DELETE', headers: getHeaders() });
                if (!res.ok) throw new Error('Failed to delete');
                showAlert(`✅ "${title}" deleted.`);
                loadProducts();
            } catch (err) {
                showAlert('❌ ' + err.message, 'error');
            }
        }

        loadProducts();
    </script>
</body>

</html>
