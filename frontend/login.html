<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Digital Store</title>
    <meta name="description" content="Login to your Digital Store account to purchase digital products." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a1a;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: rgba(102, 126, 234, 0.6);
            outline: none;
            background: rgba(102, 126, 234, 0.08);
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 8s ease-in-out infinite;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -30px);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

    <!-- Background orbs -->
    <div class="floating-orb w-96 h-96 bg-purple-600 -top-48 -left-48"></div>
    <div class="floating-orb w-80 h-80 bg-blue-600 -bottom-40 -right-40" style="animation-delay:4s"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center space-x-2 mb-4">
                <div class="w-10 h-10 btn-primary rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z" />
                    </svg>
                </div>
                <span class="text-2xl font-black gradient-text">Digital Store</span>
            </a>
            <h1 class="text-3xl font-black text-white">Welcome back</h1>
            <p class="text-slate-400 mt-2">Sign in to access your purchases</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-2xl p-8">
            <div id="error-alert"
                class="hidden mb-4 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
                    <input id="email" type="email" placeholder="you@example.com" required
                        class="input-field w-full px-4 py-3.5 rounded-xl text-sm" />
                </div>

                <div class="mb-6">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
                    <div class="relative">
                        <input id="password" type="password" placeholder="••••••••" required
                            class="input-field w-full px-4 py-3.5 rounded-xl text-sm pr-12" />
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="login-btn"
                    class="btn-primary w-full text-white font-semibold py-3.5 rounded-xl text-base">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-loading" class="hidden">
                        <svg class="animate-spin w-5 h-5 inline" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                        </svg>
                        Signing in...
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-400">
                Don't have an account?
                <a href="register.html" class="text-purple-400 hover:text-purple-300 font-medium ml-1">Create one →</a>
            </div>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">← Back to
                Store</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');
            const errorAlert = document.getElementById('error-alert');

            errorAlert.classList.add('hidden');
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Login failed');
                }

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify({
                    id: data.user_id,
                    username: data.username,
                    email: data.email,
                    is_admin: data.is_admin,
                }));

                // Redirect
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                window.location.href = redirect || 'dashboard.html';

            } catch (err) {
                errorAlert.textContent = err.message;
                errorAlert.classList.remove('hidden');
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
