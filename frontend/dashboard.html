<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a1a;
            color: #e2e8f0;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: all 0.3s ease;
        }

        .tab-active {
            border-bottom: 2px solid #667eea;
            color: #a78bfa;
        }

        .tab-inactive {
            color: #64748b;
            border-bottom: 2px solid transparent;
        }

        .card-glow {
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.15);
        }

        .badge-paid {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-cancelled {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .shimmer {
            background: linear-gradient(90deg, #1a1a3e 25%, #2a2a5e 50%, #1a1a3e 75%);
            background-size: 200%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .credential-box {
            background: rgba(102, 126, 234, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-slate-900/80 backdrop-blur-xl border-b border-white/8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-8 h-8 btn-primary rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M3 4h14v2H3zM3 9h6v7H3zM14 9h3v7h-3z" />
                    </svg>
                </div>
                <span class="font-bold gradient-text">Digital Store</span>
            </a>
            <div class="flex items-center space-x-4">
                <a href="index.html" class="text-slate-400 hover:text-white text-sm transition-colors">Shop</a>
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 rounded-full btn-primary flex items-center justify-center text-sm font-bold text-white"
                        id="avatar">U</div>
                    <span id="nav-username" class="text-white text-sm font-medium hidden sm:block"></span>
                </div>
                <button onclick="logout()"
                    class="text-red-400 hover:text-red-300 text-sm transition-colors px-3 py-1.5 glass rounded-lg">Logout</button>
            </div>
        </div>
    </nav>

    <div class="pt-24 pb-20 px-4">
        <div class="max-w-5xl mx-auto">

            <!-- Welcome Banner -->
            <div class="glass rounded-2xl p-6 mb-8 card-glow flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-2xl font-black text-white">Welcome back, <span id="welcome-username"
                            class="gradient-text">User!</span></h1>
                    <p class="text-slate-400 text-sm mt-1">Manage your purchases and account settings.</p>
                </div>
                <a href="index.html" class="btn-primary text-white font-semibold px-5 py-2.5 rounded-xl text-sm">
                    🛒 Shop More
                </a>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="glass rounded-xl p-4 text-center">
                    <div id="stat-purchased" class="text-3xl font-black gradient-text">—</div>
                    <div class="text-slate-400 text-xs mt-1">Purchased</div>
                </div>
                <div class="glass rounded-xl p-4 text-center">
                    <div id="stat-orders" class="text-3xl font-black text-blue-400">—</div>
                    <div class="text-slate-400 text-xs mt-1">Total Orders</div>
                </div>
                <div class="glass rounded-xl p-4 text-center">
                    <div id="stat-spent" class="text-3xl font-black text-green-400">—</div>
                    <div class="text-slate-400 text-xs mt-1">Total Spent</div>
                </div>
                <div class="glass rounded-xl p-4 text-center">
                    <div class="text-3xl font-black text-purple-400">🔒</div>
                    <div class="text-slate-400 text-xs mt-1">Secure</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-white/10 mb-7">
                <button id="tab-purchases" onclick="showTab('purchases')"
                    class="tab-active px-5 py-3 text-sm font-medium transition-all">My Products</button>
                <button id="tab-orders" onclick="showTab('orders')"
                    class="tab-inactive px-5 py-3 text-sm font-medium transition-all">Order History</button>
            </div>

            <!-- My Products Tab -->
            <div id="panel-purchases">
                <div id="loading-purchases" class="space-y-4">
                    <div class="shimmer rounded-xl h-32"></div>
                    <div class="shimmer rounded-xl h-32"></div>
                </div>
                <div id="purchases-list" class="hidden space-y-4"></div>
                <div id="no-purchases" class="hidden text-center py-16 text-slate-400">
                    <div class="text-5xl mb-4">🛍️</div>
                    <p class="text-lg font-medium">No products yet</p>
                    <p class="text-sm mt-2 mb-6">Purchase a product to see it here.</p>
                    <a href="index.html" class="btn-primary text-white px-6 py-3 rounded-xl inline-block">Browse
                        Products</a>
                </div>
            </div>

            <!-- Orders Tab -->
            <div id="panel-orders" class="hidden">
                <div id="loading-orders" class="space-y-3">
                    <div class="shimmer rounded-xl h-16"></div>
                    <div class="shimmer rounded-xl h-16"></div>
                    <div class="shimmer rounded-xl h-16"></div>
                </div>
                <div id="orders-list" class="hidden space-y-3"></div>
                <div id="no-orders" class="hidden text-center py-16 text-slate-400">
                    <div class="text-5xl mb-4">📋</div>
                    <p>No orders yet</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!token || !user) window.location.href = 'login.html';

        function getHeaders() {
            return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function setup() {
            document.getElementById('nav-username').textContent = user.username;
            document.getElementById('welcome-username').textContent = user.username + '!';
            document.getElementById('avatar').textContent = user.username[0].toUpperCase();
            loadPurchases();
            loadOrders();
        }

        async function loadPurchases() {
            try {
                const res = await fetch(`${API_BASE}/orders/my/purchased`, { headers: getHeaders() });
                const data = await res.json();

                document.getElementById('loading-purchases').classList.add('hidden');
                document.getElementById('stat-purchased').textContent = data.length;

                if (data.length === 0) {
                    document.getElementById('no-purchases').classList.remove('hidden');
                    return;
                }

                const list = document.getElementById('purchases-list');
                list.classList.remove('hidden');
                list.innerHTML = data.map(p => `
          <div class="glass rounded-xl p-5 card-glow">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h3 class="font-bold text-white text-lg">${p.product_title}</h3>
                <p class="text-slate-400 text-sm mt-1">${p.product_description || ''}</p>
              </div>
              <span class="badge-paid text-xs px-2 py-1 rounded-full">✅ Purchased</span>
            </div>
            <div class="credential-box rounded-xl p-4 space-y-3">
              <div class="flex items-center justify-between">
                <span class="text-slate-400 text-xs">📧 Account Email</span>
                <button onclick="copyText('${p.account_email}')" class="text-purple-400 text-xs hover:text-purple-300">Copy</button>
              </div>
              <div class="font-mono text-sm text-white bg-white/5 px-3 py-2 rounded-lg">${p.account_email}</div>
              <div class="flex items-center justify-between">
                <span class="text-slate-400 text-xs">🔑 Password</span>
                <button onclick="copyText('${p.account_password}')" class="text-purple-400 text-xs hover:text-purple-300">Copy</button>
              </div>
              <div class="font-mono text-sm text-white bg-white/5 px-3 py-2 rounded-lg">${p.account_password}</div>
            </div>
            <div class="text-slate-500 text-xs mt-3">
              Purchased: ${new Date(p.purchased_at).toLocaleString()}
            </div>
          </div>
        `).join('');
            } catch {
                document.getElementById('loading-purchases').classList.add('hidden');
                document.getElementById('no-purchases').classList.remove('hidden');
            }
        }

        async function loadOrders() {
            try {
                const res = await fetch(`${API_BASE}/orders/my`, { headers: getHeaders() });
                const orders = await res.json();

                document.getElementById('loading-orders').classList.add('hidden');
                document.getElementById('stat-orders').textContent = orders.length;

                // Calculate total spent
                const paid = orders.filter(o => o.status === 'paid');
                // we don't have price in order directly, approximate from purchases
                document.getElementById('stat-spent').textContent = `$${(paid.length * 0).toFixed(2)}`;

                if (orders.length === 0) {
                    document.getElementById('no-orders').classList.remove('hidden');
                    return;
                }

                const list = document.getElementById('orders-list');
                list.classList.remove('hidden');
                list.innerHTML = orders.map(o => {
                    const statusClass = o.status === 'paid' ? 'badge-paid' : o.status === 'pending' ? 'badge-pending' : 'badge-cancelled';
                    const statusLabel = o.status === 'paid' ? '✅ Paid' : o.status === 'pending' ? '⏳ Pending' : '❌ ' + o.status;
                    return `
            <div class="glass rounded-xl p-4 flex items-center justify-between">
              <div>
                <div class="font-medium text-white">Order #${o.id}</div>
                <div class="text-slate-400 text-sm">Product ID: ${o.product_id}</div>
                <div class="text-slate-500 text-xs">${new Date(o.created_at).toLocaleString()}</div>
              </div>
              <span class="${statusClass} text-xs px-3 py-1.5 rounded-full font-medium">${statusLabel}</span>
            </div>
          `;
                }).join('');
            } catch { }
        }

        function showTab(tab) {
            const tabs = ['purchases', 'orders'];
            tabs.forEach(t => {
                document.getElementById(`tab-${t}`).className = t === tab ? 'tab-active px-5 py-3 text-sm font-medium transition-all' : 'tab-inactive px-5 py-3 text-sm font-medium transition-all';
                document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
        }

        setup();
    </script>
</body>

</html>
