<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – Digital Store</title>
    <meta name="description" content="Create a Digital Store account to start purchasing digital products instantly." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a1a;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: rgba(102, 126, 234, 0.6);
            outline: none;
            background: rgba(102, 126, 234, 0.08);
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 8s ease-in-out infinite;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -30px);
            }
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-8 relative overflow-hidden">

    <div class="floating-orb w-96 h-96 bg-purple-600 -top-48 -right-48"></div>
    <div class="floating-orb w-80 h-80 bg-pink-600 -bottom-40 -left-40" style="animation-delay:3s"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center space-x-2 mb-4">
                <div class="w-10 h-10 btn-primary rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z" />
                    </svg>
                </div>
                <span class="text-2xl font-black gradient-text">Digital Store</span>
            </a>
            <h1 class="text-3xl font-black text-white">Create Account</h1>
            <p class="text-slate-400 mt-2">Join thousands of happy customers</p>
        </div>

        <div class="glass rounded-2xl p-8">
            <div id="error-alert"
                class="hidden mb-4 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>
            <div id="success-alert"
                class="hidden mb-4 p-4 bg-green-500/10 border border-green-500/30 rounded-xl text-green-400 text-sm">
            </div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Username</label>
                    <input id="username" type="text" placeholder="yourname" required minlength="3"
                        class="input-field w-full px-4 py-3.5 rounded-xl text-sm" />
                </div>

                <div class="mb-4">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
                    <input id="email" type="email" placeholder="you@example.com" required
                        class="input-field w-full px-4 py-3.5 rounded-xl text-sm" />
                </div>

                <div class="mb-5">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
                    <div class="relative">
                        <input id="password" type="password" placeholder="Min. 6 characters" required minlength="6"
                            class="input-field w-full px-4 py-3.5 rounded-xl text-sm pr-12"
                            oninput="checkPasswordStrength(this.value)" />
                        <button type="button" onclick="togglePwd('password')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <!-- password strength -->
                    <div class="flex gap-1 mt-2">
                        <div id="s1" class="strength-bar flex-1 bg-white/10"></div>
                        <div id="s2" class="strength-bar flex-1 bg-white/10"></div>
                        <div id="s3" class="strength-bar flex-1 bg-white/10"></div>
                    </div>
                    <p id="strength-text" class="text-xs text-slate-500 mt-1"></p>
                </div>

                <div class="mb-6">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Confirm Password</label>
                    <input id="confirm-password" type="password" placeholder="Re-enter password" required
                        class="input-field w-full px-4 py-3.5 rounded-xl text-sm" />
                </div>

                <button type="submit" id="register-btn"
                    class="btn-primary w-full text-white font-semibold py-3.5 rounded-xl text-base">
                    <span id="btn-text">Create Account</span>
                    <span id="btn-loading" class="hidden">
                        <svg class="animate-spin w-5 h-5 inline" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                        </svg>
                        Creating account...
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-400">
                Already have an account?
                <a href="login.html" class="text-purple-400 hover:text-purple-300 font-medium ml-1">Sign in →</a>
            </div>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">← Back to
                Store</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        if (localStorage.getItem('token')) window.location.href = 'index.html';

        function togglePwd(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function checkPasswordStrength(pwd) {
            const s1 = document.getElementById('s1');
            const s2 = document.getElementById('s2');
            const s3 = document.getElementById('s3');
            const txt = document.getElementById('strength-text');
            const bars = [s1, s2, s3];
            bars.forEach(b => b.style.background = 'rgba(255,255,255,0.1)');

            if (pwd.length < 6) { txt.textContent = ''; return; }

            let score = 0;
            if (pwd.length >= 8) score++;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd) && /[^a-zA-Z0-9]/.test(pwd)) score++;

            const colors = ['#ef4444', '#f59e0b', '#10b981'];
            const labels = ['Weak', 'Medium', 'Strong'];
            for (let i = 0; i <= score; i++) bars[i].style.background = colors[score];
            txt.textContent = labels[score] || '';
            txt.style.color = colors[score];
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const btn = document.getElementById('register-btn');
            const errorAlert = document.getElementById('error-alert');
            const successAlert = document.getElementById('success-alert');

            errorAlert.classList.add('hidden');
            successAlert.classList.add('hidden');

            if (password !== confirm) {
                errorAlert.textContent = 'Passwords do not match!';
                errorAlert.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loading').classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed');

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify({
                    id: data.user_id, username: data.username, email: data.email, is_admin: data.is_admin
                }));

                successAlert.textContent = '✅ Account created! Redirecting...';
                successAlert.classList.remove('hidden');
                setTimeout(() => window.location.href = 'index.html', 1200);
            } catch (err) {
                errorAlert.textContent = err.message;
                errorAlert.classList.remove('hidden');
                btn.disabled = false;
                document.getElementById('btn-text').classList.remove('hidden');
                document.getElementById('btn-loading').classList.add('hidden');
            }
        }
    </script>
</body>

</html>
